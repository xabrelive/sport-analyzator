services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sport}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sport}
      POSTGRES_DB: ${POSTGRES_DB:-sport_analyzator}
    ports:
      - "11002:11002"
    command: ["postgres", "-c", "port=11002"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -p 11002 -U ${POSTGRES_USER:-sport} -d ${POSTGRES_DB:-sport_analyzator}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "11003:11003"
    command: ["redis-server", "--port", "11003"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p 11003 ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sport}:${POSTGRES_PASSWORD:-sport}@postgres:11002/${POSTGRES_DB:-sport_analyzator}
      REDIS_URL: redis://redis:11003/0
    ports:
      - "11001:11001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["sh", "-c", "uv run alembic upgrade head && exec uv run uvicorn app.main:app --host 0.0.0.0 --port 11001"]
    volumes:
      - ./backend:/app

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    command: ["uv", "run", "celery", "-A", "app.worker.celery_app", "worker", "-l", "info", "-Q", "collect,normalize,probability,signals"]
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      DATABASE_URL: postgresql://${POSTGRES_USER:-sport}:${POSTGRES_PASSWORD:-sport}@postgres:11002/${POSTGRES_DB:-sport_analyzator}
      REDIS_URL: redis://redis:11003/0
    depends_on:
      - backend
      - redis
    volumes:
      - ./backend:/app

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    command: ["uv", "run", "celery", "-A", "app.worker.celery_app", "beat", "-l", "info"]
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      DATABASE_URL: postgresql://${POSTGRES_USER:-sport}:${POSTGRES_PASSWORD:-sport}@postgres:11002/${POSTGRES_DB:-sport_analyzator}
      REDIS_URL: redis://redis:11003/0
    depends_on:
      - celery_worker
    volumes:
      - ./backend:/app

  telegram_bot:
    build:
      context: ./telegram_bot
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      - backend
      - redis
    volumes:
      - ./telegram_bot:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:11001
      NEXT_PUBLIC_WS_URL: ws://localhost:11001/ws
      BACKEND_URL: http://backend:11001
      PORT: 11000
    ports:
      - "11000:11000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
