services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pingwin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pingwin}
      POSTGRES_DB: ${POSTGRES_DB:-pingwin}
    ports:
      - "11002:11002"
    command: ["postgres", "-c", "port=11002"]
    volumes:
      - pingwin_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -p 11002 -U ${POSTGRES_USER:-pingwin} -d ${POSTGRES_DB:-pingwin}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pingwin}:${POSTGRES_PASSWORD:-pingwin}@postgres:11002/${POSTGRES_DB:-pingwin}
    ports:
      - "11001:11001"
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-c", "alembic upgrade head && exec uvicorn app.main:app --host 0.0.0.0 --port 11001"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "11000:11000"
    environment:
      PORT: 11000
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:11001
      BACKEND_URL: http://backend:11001

volumes:
  pingwin_postgres_data:
