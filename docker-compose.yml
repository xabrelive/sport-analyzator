services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pingwin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pingwin}
      POSTGRES_DB: ${POSTGRES_DB:-pingwin}
    ports:
      - "11002:11002"
    command: ["postgres", "-c", "port=11002"]
    volumes:
      - pingwin_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -p 11002 -U ${POSTGRES_USER:-pingwin} -d ${POSTGRES_DB:-pingwin}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pingwin}:${POSTGRES_PASSWORD:-pingwin}@postgres:11002/${POSTGRES_DB:-pingwin}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USE_SSL: ${SMTP_USE_SSL:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
    ports:
      - "11001:11001"
    depends_on:
      postgres:
        condition: service_healthy
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "11001"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:11001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:11001
    ports:
      - "11000:11000"
    environment:
      PORT: 11000
      NODE_ENV: production
      BACKEND_URL: http://backend:11001

  telegram_bot:
    build:
      context: ./telegram_bot
      dockerfile: Dockerfile
    env_file: .env
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      BACKEND_URL: http://backend:11001
      FRONTEND_URL: ${FRONTEND_URL:-https://pingwin.pro}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-PingWin}
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pingwin_postgres_data:
