services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sport}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sport}
      POSTGRES_DB: ${POSTGRES_DB:-sport_analyzator}
    ports:
      - "12002:12000"
    command: ["postgres", "-c", "port=12000"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -p 12000 -U ${POSTGRES_USER:-sport} -d ${POSTGRES_DB:-sport_analyzator}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "12003:12000"
    command: ["redis-server", "--port", "12000"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p 12000 ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Backend: для доступа по LAN задайте в .env CORS_EXTRA_ORIGINS=http://ВАШ_IP:12000
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sport}:${POSTGRES_PASSWORD:-sport}@postgres:12000/${POSTGRES_DB:-sport_analyzator}
      REDIS_URL: redis://redis:12000/0
      CORS_EXTRA_ORIGINS: ${CORS_EXTRA_ORIGINS:-}
      BETSAPI_TOKEN: ${BETSAPI_TOKEN:-}
      ENABLE_SCHEDULED_COLLECTORS: ${ENABLE_SCHEDULED_COLLECTORS:-true}
      # Ссылки в TG и письмах: домен вместо IP (если в .env не задано — по умолчанию pingwin.pro)
      FRONTEND_PUBLIC_URL: ${FRONTEND_PUBLIC_URL:-https://pingwin.pro}
    ports:
      - "12001:12000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["sh", "-c", "uv run alembic upgrade head && exec uv run uvicorn app.main:app --host 0.0.0.0 --port 12000"]
    volumes:
      - ./backend:/app

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    command: ["uv", "run", "celery", "-A", "app.worker.celery_app", "worker", "-l", "info", "-Q", "collect,probability,signals", "-c", "4"]
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      DATABASE_URL: postgresql://${POSTGRES_USER:-sport}:${POSTGRES_PASSWORD:-sport}@postgres:12000/${POSTGRES_DB:-sport_analyzator}
      REDIS_URL: redis://redis:12000/0
      FRONTEND_PUBLIC_URL: ${FRONTEND_PUBLIC_URL:-https://pingwin.pro}
    depends_on:
      - backend
      - redis
    volumes:
      - ./backend:/app

  celery_worker_2:
