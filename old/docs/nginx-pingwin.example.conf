# Пример конфигурации nginx для сайта на одном домене (pingwin.pro).
# API и WebSocket проксируются на бэкенд; остальное — на Next.js (фронт).
#
# Подключение: в секцию server { } вашего сервера для pingwin.pro добавьте
# include /path/to/sport-analyzator/docs/nginx-pingwin.example.conf;
# или скопируйте блоки location ниже в свой server.

    # Бэкенд (FastAPI): API и WebSocket
    location /api/ {
        proxy_pass http://127.0.0.1:12001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        proxy_pass http://127.0.0.1:12001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Остальное — на фронт (Next.js), если он на том же сервере
